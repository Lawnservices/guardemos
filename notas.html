<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href=" notas.css">
    <title>Aplicación de Notas | Save your notes</title>
    <style>
       
    </style>
</head>
<body>
    <!-- Barra de navegación -->
    <div class="navbar">
        <a href="#" onclick="return false">Notebook | Libro de Notas</a>
        <!-- <a href="#">Laguna</a> -->
        
        <button onclick="logout()">Cerrar Sesión</button>
    </div>

    <!-- Contenedor de la aplicación de notas -->
    <div class="container">
        <h2>Aplicación de Notas</h2>
        <input type="text" id="inputText" placeholder="Escribe una nota..." required>
        <button id="guardarBtn" onclick="guardarNota()">Guardar Nota</button>
        <div id="notasContainer"></div>

    <input type="text" id="taskInput" placeholder="Escribe una tarea...">
    <button onclick="addTask()">Agregar tarea</button>

    <ul id="taskList"></ul>
    </div>

    <script src="notas.js"></script>
    <script>
         const taskInput = document.getElementById('taskInput');
const taskList = document.getElementById('taskList');

let tasks = [];

// CARGAR TAREAS
async function loadTasks() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "login.html";
    return;
  }

  try {
    const res = await fetch("https://mlaguna.pythonanywhere.com/api/tasks/load", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (!data.ok) {
      alert(data.error || "Error cargando tareas");
      window.location.href = "login.html";
      return;
    }

    tasks = data.tasks || [];
    renderTasks();

  } catch (error) {
    console.error("Error loadTasks:", error);
    alert("Error de conexión");
  }
}

// GUARDAR TAREAS (con protección básica)
async function saveTasks() {
  const token = localStorage.getItem("token");

  if (!token) return;

  try {
    await fetch("https://mlaguna.pythonanywhere.com/api/tasks/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, tasks })
    });
  } catch (error) {
    console.error("Error saveTasks:", error);
  }
}

function renderTasks() {
  taskList.innerHTML = '';

  tasks.forEach((task, index) => {
    const li = document.createElement('li');
    li.className = task.completed ? 'completed' : '';

    const span = document.createElement('span');
    span.textContent = task.text;

    span.onclick = () => {
      task.completed = !task.completed;
      saveTasks();
      renderTasks();
    };

    const del = document.createElement('button');
    del.textContent = "Eliminar";

    del.onclick = () => {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    };

    li.appendChild(span);
    li.appendChild(del);
    taskList.appendChild(li);
  });
}

function addTask() {
  const text = taskInput.value.trim();

  if (!text) return;

  tasks.push({ text, completed: false });

  taskInput.value = '';

  renderTasks();
  saveTasks();
}

// Cargar tareas al abrir la página
loadTasks();


//instalar detectar 
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // aquí puedes mostrar tu botón
  const btn = document.getElementById("installBtn");
  if (btn) btn.style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    console.log("App instalada");
  }

  deferredPrompt = null;
});
    </script>
</body>
</html>
