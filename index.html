<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aplicación de Notas | Guarda tus notas online</title>

    <meta name="description" content="Guarda tus notas de forma segura y accede a ellas desde cualquier dispositivo cuando las necesites.">

    <meta name="author" content="ListaDeTareas.com">

    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="save.css">

    <link rel="icon" href="/img/favicon.ico">
</head>

<body>

    <nav class="navbar">
        <a href="#" onclick="return false">Notebook | Libro de Notas</a>

        <button type="button" onclick="logout()">
            Cerrar sesión
        </button>
    </nav>

    <main class="container">

        <h1>Aplicación de Notas</h1>

        <input
            type="text"
            id="inputText"
            placeholder="Escribe una nota..."
            maxlength="500"
            autocomplete="off"
        >

        <button
            id="guardarBtn"
            type="button"
            onclick="guardarNota()">
            Guardar nota
        </button>

        <div id="notasContainer"></div>

    </main>

    <script src="save.js" defer></script>

</body>
</html>
